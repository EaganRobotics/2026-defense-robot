name: Code Simulation Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simulate:
    name: Simulation
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Filter changes for relevant files
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            java:
              - 'src/main/java/**'
              - 'src/test/java/**'
              - 'build.gradle'

      - name: Grant execute permission for gradlew
        if: steps.filter.outputs.java == 'true'
        run: chmod +x gradlew

      - name: Setup Gradle
        if: steps.filter.outputs.java == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run simulation smoke test
        if: steps.filter.outputs.java == 'true'
        run: ./gradlew test --tests "frc.robot26.RobotSimulationTest" --no-daemon
