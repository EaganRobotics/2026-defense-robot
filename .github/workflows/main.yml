# This is a basic workflow to build robot code.
name: CI
# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  format_check:
    name: Format Check & Auto-Fix
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Allows the action to push commits back to the repo
    # We remove 'container' here so we have native git access for pushing commits
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # Checkout the actual branch, not the detached HEAD
          fetch-depth: 0
          token: ${{ secrets.CI_ADMIN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-spotless-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-spotless-

      - name: Run Spotless Check
        id: spotless
        # We continue on error so we can fix it in the next step
        continue-on-error: true 
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run Spotless Apply (Fix)
        if: steps.spotless.outcome == 'failure'
        run: ./gradlew spotlessApply --no-daemon

      - name: Commit and Push Fixes
        if: steps.spotless.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix formatting with Spotless [skip ci]"
          file_pattern: 'src/**/*.java'
          branch: ${{ github.head_ref }}
      
      - name: Fail if changes were needed
        if: steps.spotless.outcome == 'failure'
        run: |
          echo "Formatting issues were found and auto-fixed. Please pull the latest changes."
          exit 1

  build:
    name: Build
    runs-on: ubuntu-22.04
    container: wpilib/roborio-cross-ubuntu:2025-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Add repository to git safe directories
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Filter changes for relevant files
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            java:
              - 'src/main/java/**'
              - 'build.gradle'

      - name: Grant execute permission for gradlew
        if: steps.filter.outputs.java == 'true'
        run: chmod +x gradlew

      - name: Setup Gradle
        if: steps.filter.outputs.java == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile robot code
        if: steps.filter.outputs.java == 'true'
        run: ./gradlew build -PrunSpotBugs --no-daemon --parallel
